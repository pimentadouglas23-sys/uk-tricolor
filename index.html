<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK Tricolor - Painel Administrativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@700&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* MANTENDO SEU DESIGN ORIGINAL E EDITÁVEL */
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{--azul:#004791;--vermelho:#CC0000;}
        body{font-family:'Barlow',sans-serif;background:var(--azul);color:#fff;overflow-x:hidden;}
        nav{position:fixed;top:0;width:100%;z-index:1000;background:rgba(0,30,80,0.97);border-bottom:3px solid var(--vermelho);display:flex;align-items:center;padding:0 1rem;height:60px;}
        .logo{display:flex;align-items:center;gap:8px;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px;cursor:pointer;}
        .logo img{width:36px;height:36px;border-radius:50%;border:2px solid #fff;}
        .menu-btn{margin-left:auto;background:none;border:none;color:#fff;font-size:1.8rem;cursor:pointer;padding:4px 10px;}
        .menu-mobile{display:none;position:fixed;top:60px;left:0;right:0;background:#003070;z-index:999;border-bottom:3px solid var(--vermelho);}
        .menu-mobile a{display:block;padding:1rem 1.5rem;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,0.1);cursor:pointer;}
        .page{display:none;min-height:100vh;padding-top:60px;}
        .page.active{display:block;}
        .hero{position:relative;min-height:85vh;display:flex;align-items:flex-end;overflow:hidden;}
        .hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(0.3);transition: 0.5s;}
        .hero-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,30,80,0.97) 0%,transparent 60%);}
        .hero-content{position:relative;z-index:2;padding:2rem 1.5rem;}
        .hero h1{font-family:'Bebas Neue',sans-serif;font-size:5rem;line-height:0.9;letter-spacing:3px;}
        .hero h1 span{color:var(--vermelho);}
        .sec{padding:2rem 1.5rem;}
        .admin-card{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:1.3rem;margin-bottom:1rem;}
        .inp, .sel{width:100%;padding:10px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#fff;margin-bottom:8px;}
        .btn-adm{background:var(--vermelho);color:#fff;border:none;padding:10px;border-radius:6px;width:100%;cursor:pointer;font-weight:700;text-transform:uppercase;}
        .tab-btn{flex:1;padding:0.9rem;background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;border-bottom:3px solid transparent;}
        .tab-btn.ativo{color:#fff;border-bottom-color:var(--vermelho);}
        .tab-conteudo{display:none;}
        .tab-conteudo.ativo{display:block;}
        table{width:100%;border-collapse:collapse;margin-top:10px;}
        th, td{padding:10px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.1);font-size:0.8rem;}
        .toast{position:fixed;bottom:1.2rem;right:1.2rem;z-index:4000;background:#003a7a;border:1px solid #fff;border-radius:8px;padding:0.8rem 1.2rem;display:none;}
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<nav>
    <div class="logo" onclick="ir('home')">
        <img src="https://i.ibb.co/21rb1B4J/IMG-20251226-204138-593.webp" alt="Logo">
        <span>UK TRICOLOR</span>
    </div>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
</nav>

<div class="menu-mobile" id="menu">
    <a onclick="ir('home')">🏠 Home</a>
    <a onclick="ir('admin')">⚙️ Painel de Edição</a>
</div>

<div id="home" class="page active">
    <div class="hero">
        <div class="hero-bg" id="hero-img" style="background-image: url('https://i.ibb.co/8L6mP9S/capa-padrao.jpg');"></div>
        <div class="hero-grad"></div>
        <div class="hero-content">
            <h1>UK<br><span>TRICOLOR</span></h1>
            <p>Painel Administrativo Ativo</p>
        </div>
    </div>
</div>

<div id="admin" class="page">
    <div class="sec">
        <h2 style="font-family:'Bebas Neue'; font-size:2.5rem;">⚙️ MODO <span>EDITOR</span></h2>
        
        <div style="display:flex; background:rgba(0,0,0,0.3); margin: 15px 0;">
            <button class="tab-btn ativo" onclick="tabAdm(event, 'edit-site')">🌐 Site</button>
            <button class="tab-btn" onclick="tabAdm(event, 'edit-bolao')">🏆 Bolão</button>
            <button class="tab-btn" onclick="tabAdm(event, 'edit-membros')">👥 Membros</button>
        </div>

        <div id="edit-site" class="tab-conteudo ativo">
            <div class="admin-card">
                <h3>Alterar Foto de Capa</h3>
                <p style="font-size:0.8rem; margin-bottom:10px; opacity:0.7;">Cole o link da imagem (ex: do Imgur ou PostImages)</p>
                <input id="input-capa" class="inp" placeholder="URL da Imagem">
                <button class="btn-adm" onclick="salvarCapa()">Atualizar Foto do Site</button>
            </div>
        </div>

        <div id="edit-bolao" class="tab-conteudo">
            <div class="admin-card">
                <h3>Adicionar Novo Jogo</h3>
                <input id="j-casa" class="inp" placeholder="Time Casa (Ex: Bahia)">
                <input id="j-fora" class="inp" placeholder="Visitante">
                <input id="j-data" class="inp" type="date">
                <button class="btn-adm" onclick="addJogo()">Publicar Jogo</button>
            </div>
            <div id="lista-jogos-edit"></div>
        </div>

        <div id="edit-membros" class="tab-conteudo">
            <div class="admin-card">
                <h3>Ajustar Classificação (Pontos)</h3>
                <select id="sel-membro" class="sel"><option>Carregando membros...</option></select>
                <input id="qtd-pontos" class="inp" type="number" placeholder="Quantidade de pontos (ex: 3)">
                <button class="btn-adm" onclick="adicionarPontos()">Somar Pontos ao Membro</button>
            </div>
            <div class="admin-card">
                <h3>Relatório de Cadastrados</h3>
                <button class="btn-adm" onclick="baixarRelatorio()" style="background:#166534; margin-bottom:10px;">📥 BAIXAR EXCEL (CSV)</button>
                <div id="tabela-membros" style="overflow-x:auto;"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAtC932j-0l_z08Z8iN7D5j2MvY_R5P4E",
    authDomain: "uk-tricolor-f20da.firebaseapp.com",
    projectId: "uk-tricolor-f20da",
    storageBucket: "uk-tricolor-f20da.firebasestorage.app",
    messagingSenderId: "1090333333550",
    appId: "1:1090333333550:web:9349880155b4144365798b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// NAVEGAÇÃO BÁSICA
function ir(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('menu').style.display = 'none';
}
function toggleMenu() {
    const m = document.getElementById('menu');
    m.style.display = m.style.display === 'block' ? 'none' : 'block';
}
function tabAdm(e, id) {
    document.querySelectorAll('.tab-conteudo').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('ativo'));
    document.getElementById(id).classList.add('active');
    e.currentTarget.classList.add('ativo');
}
function mostrarAviso(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}

// --- FUNÇÕES DE EDIÇÃO (O QUE VOCÊ QUERIA) ---

// 1. EDITAR CAPA DO SITE
async function salvarCapa() {
    const url = document.getElementById('input-capa').value;
    if(!url) return alert("Cole um link!");
    await db.collection('config').doc('aparencia').set({ capa: url });
    mostrarAviso("Capa atualizada com sucesso!");
}

function carregarCapa() {
    db.collection('config').doc('aparencia').onSnapshot(doc => {
        if(doc.exists()) {
            document.getElementById('hero-img').style.backgroundImage = `url('${doc.data().capa}')`;
        }
    });
}

// 2. EDITAR PONTOS E VER RELATÓRIO
function carregarMembros() {
    db.collection('usuarios').onSnapshot(snap => {
        const sel = document.getElementById('sel-membro');
        const tabela = document.getElementById('tabela-membros');
        sel.innerHTML = '';
        let html = `<table><tr><th>Nome</th><th>Cidade</th><th>Pts</th></tr>`;
        
        snap.forEach(doc => {
            const u = doc.data();
            sel.innerHTML += `<option value="${doc.id}">${u.nome}</option>`;
            html += `<tr><td>${u.nome}</td><td>${u.cidade}</td><td>${u.pontos || 0}</td></tr>`;
        });
        tabela.innerHTML = html + `</table>`;
    });
}

async function adicionarPontos() {
    const id = document.getElementById('sel-membro').value;
    const pts = parseInt(document.getElementById('qtd-pontos').value);
    const ref = db.collection('usuarios').doc(id);
    const doc = await ref.get();
    const atual = doc.data().pontos || 0;
    await ref.update({ pontos: atual + pts });
    mostrarAviso("Pontos creditados!");
}

// 3. EDITAR BOLÃO
async function addJogo() {
    const casa = document.getElementById('j-casa').value;
    const fora = document.getElementById('j-fora').value;
    const data = document.getElementById('j-data').value;
    await db.collection('jogos').add({ casa, fora, data, encerrado: false, criadoEm: new Date() });
    mostrarAviso("Jogo adicionado ao site!");
}

// INICIALIZAR
carregarCapa();
carregarMembros();

</script>
</body>
</html>
